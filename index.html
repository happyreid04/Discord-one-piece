<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ONE PIECE - The Journey Begins</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'SF Mono', monospace;
            overflow: hidden;
            position: relative;
        }

        /* Cinematic letterbox bars */
        body::before,
        body::after {
            content: '';
            position: fixed;
            left: 0;
            right: 0;
            background: black;
            z-index: 100;
            pointer-events: none;
        }

        body::before {
            top: 0;
            height: 8vh;
        }

        body::after {
            bottom: 0;
            height: 8vh;
        }

        /* Grain overlay for film effect */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.3;
            animation: grainShift 8s steps(10) infinite;
        }

        @keyframes grainShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(2%, 2%); }
        }

        /* Main game container */
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Canvas for game rendering */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* UI Overlay */
        .ui-overlay {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.85);
            border-left: 4px solid #FFD700;
            border-right: 4px solid #FFD700;
            border-radius: 12px;
            padding: 20px 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 30px rgba(0,0,0,0.7), 0 0 10px rgba(255,215,0,0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        /* Episode title card */
        .episode-title {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #FFD700;
            padding-bottom: 10px;
        }

        .episode-title h1 {
            color: #FFD700;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
        }

        .episode-title h2 {
            color: #fff;
            font-size: 1rem;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Narrative text box (like subtitles) */
        .narrative {
            background: rgba(0, 0, 0, 0.7);
            padding: 18px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 1.05rem;
            line-height: 1.5;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Courier New', monospace;
            min-height: 120px;
            border-left: 3px solid #FFD700;
        }

        /* Choices container */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .choice-btn {
            background: rgba(20, 20, 40, 0.9);
            border: 1px solid #FFD700;
            color: #FFD700;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            text-align: left;
        }

        .choice-btn:hover {
            background: #FFD700;
            color: #0a0a2a;
            transform: translateX(8px);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,215,0,0.3);
            font-size: 0.8rem;
            color: #aaa;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a2a;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1s ease;
        }

        .loading-text {
            color: #FFD700;
            font-size: 1.5rem;
            letter-spacing: 4px;
            margin-top: 20px;
        }

        .jolly-roger {
            font-size: 4rem;
            animation: spinPulse 2s infinite;
        }

        @keyframes spinPulse {
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            50% { transform: rotate(180deg) scale(1.2); opacity: 0.7; }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .ui-overlay {
                width: 95%;
                padding: 15px;
            }
            .narrative {
                font-size: 0.9rem;
                min-height: 100px;
            }
            .episode-title h1 {
                font-size: 1rem;
            }
        }

        /* Discord Activity specific */
        .discord-safe {
            margin-top: env(safe-area-inset-top);
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="jolly-roger">💀⚓</div>
    <div class="loading-text">SETTING SAIL...</div>
</div>

<div class="grain"></div>

<div class="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-overlay" id="uiOverlay" style="display: none;">
        <div class="episode-title">
            <h1 id="episodeTitle">EPISODE 1: SETTING SAIL</h1>
            <h2 id="sceneLocation">🌊 Dawn Island Docks</h2>
        </div>
        
        <div class="narrative" id="narrativeText">
            The sun rises over Dawn Island. A young pirate with a straw hat stands at the dock, 
            ready to begin the journey of a lifetime...
        </div>
        
        <div class="choices" id="choicesContainer">
            <!-- Dynamic choices will appear here -->
        </div>
        
        <div class="status-bar">
            <div class="status-item">⭐ <span id="crewStatus">Crew: 1</span></div>
            <div class="status-item">💰 <span id="bountyStatus">0 Berries</span></div>
            <div class="status-item">🏴‍☠️ <span id="episodeStatus">Ep 1</span></div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
